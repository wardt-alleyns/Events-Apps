    --navy-light: #eef0fa;
    --bg: #f2f3f8;
    --white: #ffffff;
    --border: #d0d5e8;
    --amber: #d97706;
    --amber-bg: #fef3c7;
    --green: #166534;
    --green-bg: #dcfce7;
    --red: #b91c1c;
    --red-bg: #fee2e2;
    --grey: #6b7280;
    --grey-light: #e5e7eb;
    --text: #1a1f3a;
    --text-light: #4b5563;
    --font: 'Futura PT', 'Century Gothic', Futura, 'Trebuchet MS', sans-serif;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(43,58,143,0.10);
    --shadow-lg: 0 6px 24px rgba(43,58,143,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-mid) 100%);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 16px rgba(26,36,96,0.35);
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 0;
    min-height: 64px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header-brand {
    font-family: var(--font);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 18px 0;
  }
  .header-divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.28);
    margin: 0 20px;
    flex-shrink: 0;
  }
  .header-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header-week {
    font-family: var(--font);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
  }
  .header-dates {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.04em;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.75);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--font);
    flex-shrink: 0;
  }

  /* DAY NAV */
  .day-nav-wrap {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 64px;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(43,58,143,0.06);
  }
  .day-nav {
    display: flex;
    gap: 0;
    max-width: 1200px;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 18px 9px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.18s;
    white-space: nowrap;
    min-width: 80px;
    flex-shrink: 0;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: var(--font);
  }
  .day-tab:hover { background: var(--navy-light); }
  .day-tab.active {
    border-bottom-color: var(--navy);
    background: var(--navy-light);
  }
  .day-tab .day-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--grey);
  }
  .day-tab.active .day-name { color: var(--navy); }
  .day-tab .day-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .day-tab.active .day-num { color: var(--navy); }
  .day-tab .day-count {
    font-size: 10px;
    background: var(--navy-light);
    color: var(--navy);
    border-radius: 10px;
    padding: 1px 7px;
    margin-top: 3px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-tab.active .day-count { background: var(--navy); color: #fff; }

  /* MAIN */
  .main-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  /* DAY SECTION */
  .day-section { display: none; }
  .day-section.active { display: block; }
  .day-heading {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }

  /* EVENTS LIST */
  .events-list { display: flex; flex-direction: column; gap: 10px; }

  /* EVENT CARD */
  .event-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.18s, border-color 0.18s;
  }
  .event-card:hover { box-shadow: var(--shadow-lg); border-color: var(--navy-mid); }
  .event-card.expanded { border-color: var(--navy); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .time-pill {
    background: var(--navy);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: var(--font);
  }
  .time-pill.provisional {
    background: var(--grey);
  }
  .time-pill.commercial {
    background: var(--navy-mid);
  }

  .card-main { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sub {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-manager { display: flex; align-items: center; gap: 4px; }
  .card-ref { color: var(--grey); font-size: 10px; letter-spacing: 0.06em; }

  .card-badges {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    font-family: var(--font);
  }
  .badge-catering { background: var(--amber-bg); color: var(--amber); }
  .badge-av { background: var(--green-bg); color: var(--green); }
  .badge-estates { background: var(--navy-light); color: var(--navy); }
  .badge-notes { background: var(--red-bg); color: var(--red); }
  .badge-provisional { background: #fef9c3; color: #854d0e; }
  .badge-commercial { background: #ede9fe; color: #5b21b6; }

  .card-chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--grey);
    transition: transform 0.22s;
  }
  .event-card.expanded .card-chevron { transform: rotate(180deg); }

  /* CARD BODY */
  .card-body { display: none; border-top: 1px solid var(--border); }
  .event-card.expanded .card-body { display: block; }

  /* TABS */
  .tab-bar {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 9px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: var(--font);
    flex-shrink: 0;
  }
  .tab-btn:hover:not(.disabled) { color: var(--navy); background: var(--navy-light); }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); background: var(--white); }
  .tab-btn.disabled { color: var(--grey-light); cursor: not-allowed; opacity: 0.5; }

  .tab-pane { display: none; padding: 16px; }
  .tab-pane.active { display: block; }

  /* KV GRID */
  .kv-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .kv-row { display: contents; }
  .kv-key {
    background: var(--navy-light);
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--navy);
    border-bottom: 1px solid var(--border);
    font-family: var(--font);
  }
  .kv-val {
    background: var(--white);
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    word-break: break-word;
  }
  .kv-key:last-of-type, .kv-val:last-of-type { border-bottom: none; }
  .kv-row:last-child .kv-key,
  .kv-row:last-child .kv-val { border-bottom: none; }

  /* CONTENT SECTIONS */
  .content-section { margin-bottom: 14px; }
  .content-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 6px;
    font-family: var(--font);
  }
  .content-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .content-list li {
    padding: 6px 10px 6px 22px;
    position: relative;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    border-radius: 5px;
    line-height: 1.4;
  }
  .content-list li::before {
    content: '·';
    position: absolute;
    left: 10px;
    color: var(--navy-mid);
    font-weight: 700;
  }

  .empty-note {
    color: var(--grey);
    font-size: 12px;
    font-style: italic;
    padding: 8px 0;
  }

  /* STATUS CHIP */
  .status-chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--font);

  .status-confirmed { background: #dcfce7; color: #166534; }
  .status-provisional { background: #fef9c3; color: #854d0e; }
  .status-invoice { background: #ede9fe; color: #5b21b6; }
  .status-hire { background: #dbeafe; color: #1e40af; }

  /* FOOTER */
  .site-footer {
    background: var(--navy-dark);
    text-align: center;
    padding: 16px 24px;
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-family: var(--font);
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header-brand { font-size: 16px; letter-spacing: 0.12em; }
    .header-badge { display: none; }
    .day-tab { min-width: 60px; padding: 10px 10px 9px; }
    .day-tab .day-num { font-size: 16px; }
    .card-header { padding: 12px; gap: 8px; }
    .card-badges { display: none; }
    .kv-grid { grid-template-columns: 110px 1fr; }
    .main-content { padding: 16px 10px 48px; }
  }
</style>
</head>

// ─── RENDER ──────────────────────────────────────────────────────────────────

function statusClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('confirmed')) return 'status-confirmed';
  if (l.includes('provisional')) return 'status-provisional';
  if (l.includes('invoice')) return 'status-invoice';
  if (l.includes('hire')) return 'status-hire';
  return '';
}

function buildCard(evt, dayIdx, cardIdx) {
  const hasCatering = evt.catering && evt.catering.length > 0;
  const hasEstates  = evt.estates  && evt.estates.length > 0;
  const hasAV       = evt.av       && evt.av.length > 0;
  const hasNotes    = evt.notes    && evt.notes.length > 0;

  const isProvisional = evt.status && evt.status.toLowerCase().includes('provisional');
  const isCommercial  = evt.type === 'Commercial';

  let timePillClass = 'time-pill';
  if (isProvisional) timePillClass += ' provisional';
  else if (isCommercial) timePillClass += ' commercial';

  const badges = [];
  if (hasCatering) badges.push('<span class="badge badge-catering">Catering</span>');
  if (hasEstates)  badges.push('<span class="badge badge-estates">Estates</span>');
  if (hasAV)       badges.push('<span class="badge badge-av">AV</span>');
  if (hasNotes)    badges.push('<span class="badge badge-notes">Notes</span>');
  if (isProvisional) badges.push('<span class="badge badge-provisional">Provisional</span>');
  if (isCommercial)  badges.push('<span class="badge badge-commercial">Commercial</span>');

  const cardId = `card-${dayIdx}-${cardIdx}`;

  const kvRows = [
    ['Room(s)', evt.rooms ? evt.rooms.join(' · ') : '—'],
    ['Numbers', evt.numbers !== undefined ? evt.numbers : '—'],
    ['Ref #', evt.ref || '—'],
    ['Manager', evt.manager || '—'],
    ['Status', `<span class="status-chip ${statusClass(evt.status)}">${evt.status || '—'}</span>`],
    ['Type', evt.type || '—'],
  ];

  const kvHTML = kvRows.map(([k,v]) =>
    `<div class="kv-row"><div class="kv-key">${k}</div><div class="kv-val">${v}</div></div>`
  ).join('');

  const cateringTab = hasCatering
    ? `<ul class="content-list">${evt.catering.map(c=>`<li>${c}</li>`).join('')}</ul>`
    : `<p class="empty-note">No catering requirements noted.</p>`;

  const estatesTab = hasEstates
    ? `<ul class="content-list">${evt.estates.map(e=>`<li>${e}</li>`).join('')}</ul>`
    : `<p class="empty-note">No estates / porter requirements noted.</p>`;

  const avTab = hasAV
    ? `<ul class="content-list">${evt.av.map(a=>`<li>${a}</li>`).join('')}</ul>`
    : `<p class="empty-note">No AV / tech requirements noted.</p>`;

  const notesTab = hasNotes
    ? `<ul class="content-list">${evt.notes.map(n=>`<li>${n}</li>`).join('')}</ul>`
    : `<p class="empty-note">No additional notes.</p>`;

  const tabs = [
    { id:'overview',  label:'Overview',          content: `<div class="kv-grid">${kvHTML}</div>`, enabled: true },
    { id:'catering',  label:'Catering',           content: cateringTab, enabled: hasCatering },
    { id:'estates',   label:'Estates & Porters',  content: estatesTab, enabled: hasEstates },
    { id:'av',        label:'AV & Tech',          content: avTab, enabled: hasAV },
    { id:'notes',     label:'Other Notes',        content: notesTab, enabled: hasNotes },
  ];

  const tabBtns = tabs.map((t,i) =>
    `<button class="tab-btn${i===0?' active':''}${!t.enabled?' disabled':''}" 
      data-tab="${t.id}" data-card="${cardId}" ${!t.enabled?'disabled':''}>${t.label}</button>`
  ).join('');

  const tabPanes = tabs.map((t,i) =>
    `<div class="tab-pane${i===0?' active':''}" id="${cardId}-tab-${t.id}">${t.content}</div>`
  ).join('');

  return `
<div class="event-card" id="${cardId}">
  <div class="card-header" onclick="toggleCard('${cardId}')">
    <span class="${timePillClass}">${evt.time}</span>
    <div class="card-main">
      <div class="card-title">${evt.title}</div>
      <div class="card-sub">
        <span class="card-manager">👤 ${evt.manager}</span>
        <span class="card-ref">Ref #${evt.ref}</span>
      </div>
    </div>
    <div class="card-badges">${badges.join('')}</div>
    <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>
  <div class="card-body">
    <div class="tab-bar">${tabBtns}</div>
    <div class="tab-content">${tabPanes}</div>
  </div>
</div>`;
}

function buildDay(dayIdx) {
  const day = DAYS[dayIdx];
  const events = EVENTS[day.iso] || [];
  const dateNum = day.date.split(' ')[0];
  const dateMonth = day.date.split(' ')[1];

  const dayLabel = `${day.label} ${day.date}`;
  const cardsHTML = events.length
    ? events.map((e,i) => buildCard(e, dayIdx, i)).join('')
    : '<p style="color:var(--grey);font-style:italic;padding:12px 0;">No events scheduled.</p>';

  return `
<section class="day-section${dayIdx===0?' active':''}" id="day-${dayIdx}">
  <h2 class="day-heading">${dayLabel}</h2>
  <div class="events-list">${cardsHTML}</div>
</section>`;
}

function buildNav() {
  const nav = document.getElementById('dayNav');
  DAYS.forEach((day,i) => {
    const events = EVENTS[day.iso] || [];
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i===0?' active':'');
    btn.setAttribute('data-day', i);
    btn.innerHTML = `<span class="day-name">${day.label}</span><span class="day-num">${day.date.split(' ')[0]}</span><span class="day-count">${events.length}</span>`;
    btn.onclick = () => switchDay(i);
    nav.appendChild(btn);
  });
}

function buildMain() {
  const main = document.getElementById('mainContent');
  main.innerHTML = DAYS.map((_,i) => buildDay(i)).join('');
}

function switchDay(idx) {
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-section').forEach((s,i) => s.classList.toggle('active', i===idx));
  window.scrollTo({top: document.querySelector('.day-nav-wrap').offsetTop - 1, behavior: 'smooth'});
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || btn.disabled || btn.classList.contains('disabled')) return;
  const cardId = btn.dataset.card;
  const tabId = btn.dataset.tab;
  const card = document.getElementById(cardId);
  if (!card) return;
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById(`${cardId}-tab-${tabId}`);
  if (pane) pane.classList.add('active');
});

buildNav();
buildMain();
</script>
