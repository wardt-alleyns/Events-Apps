<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.09);
    --border-mid: rgba(0,0,0,0.15);
    --text: #1a1917;
    --text-mid: #5c5a57;
    --text-muted: #9a9894;
    --accent: #1a3a5c;
    --accent-light: #e8eef5;
    --accent-mid: #3a6ea0;
    --amber: #7a4f1a;
    --amber-light: #fdf0de;
    --green: #1a4a2e;
    --green-light: #e6f2ea;
    --red: #5c1a1a;
    --red-light: #faeaea;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Header */
  .site-header {
    background: var(--accent);
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
  }
  .school-name {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 4px;
  }
  .week-label {
    font-size: 22px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -.01em;
  }
  .week-label strong { font-weight: 500; }
  .header-meta {
    text-align: right;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-family: 'DM Mono', monospace;
    line-height: 1.8;
  }

  /* Day nav */
  .day-nav-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 88px;
    z-index: 90;
  }
  .day-nav {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    padding: 0 40px;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 14px 20px 12px;
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    position: relative;
  }
  .day-tab:hover { color: var(--text); }
  .day-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }
  .day-tab .dt-name { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; }
  .day-tab .dt-num { font-size: 20px; font-weight: 300; line-height: 1; }
  .day-tab.active .dt-num { font-weight: 500; }
  .day-tab .dt-count {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }
  .day-tab.active .dt-count { color: var(--accent-mid); }

  /* Main content */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 40px 60px;
  }

  .day-heading {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
  }
  .day-heading h2 {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: -.02em;
  }
  .day-heading .ev-count {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  /* Event cards */
  .events-stack { display: flex; flex-direction: column; gap: 10px; }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: box-shadow .15s;
  }
  .event-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: var(--surface2); }
  .card-header.open { background: var(--surface2); }

  .time-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }
  .card-mgr {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .card-badges {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .04em;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-c { background: var(--amber-light); color: var(--amber); }
  .badge-e { background: var(--accent-light); color: var(--accent); }
  .badge-a { background: var(--green-light); color: var(--green); }
  .badge-f { background: var(--red-light); color: var(--red); }

  .chevron {
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: transform .2s;
  }
  .card-header.open .chevron { transform: rotate(180deg); }

  /* Detail panel */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
  }
  .card-detail.open { display: block; }

  .detail-tabs {
    display: flex;
    gap: 0;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .detail-tabs::-webkit-scrollbar { display: none; }
  .dtab {
    font-size: 12px;
    font-weight: 400;
    padding: 10px 14px 9px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: all .12s;
    flex-shrink: 0;
  }
  .dtab:hover { color: var(--text); }
  .dtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .dtab.empty { opacity: .38; cursor: default; }

  .detail-content {
    padding: 16px 18px;
  }
  .info-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 0;
  }
  .info-row {
    display: contents;
  }
  .info-row > span {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .info-row > span:last-child { border-bottom-color: transparent; }
  .info-row:last-child > span { border-bottom: none; }
  .info-key {
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: .04em;
    padding-right: 12px;
    padding-top: 8px !important;
    vertical-align: top;
  }
  .info-val { color: var(--text); }

  .list-items { display: flex; flex-direction: column; gap: 0; }
  .list-item {
    display: flex;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .list-item:last-child { border-bottom: none; }
  .list-bullet {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    margin-top: 6px;
  }
  .list-bullet.c { background: var(--amber); }
  .list-bullet.e { background: var(--accent-mid); }
  .list-bullet.a { background: var(--green); }
  .list-bullet.f { background: var(--red); }

  .empty-msg {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    padding: 4px 0;
  }

  /* Empty day */
  .empty-day {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-day p { font-size: 15px; }

  /* Footer */
  .site-footer {
    text-align: center;
    padding: 24px 40px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  @media (max-width: 640px) {
    .site-header { padding: 20px 16px 18px; }
    .day-nav { padding: 0 16px; }
    .main { padding: 20px 16px 40px; }
    .header-meta { display: none; }
    .card-mgr { display: none; }
    .card-header { gap: 10px; padding: 12px 14px; }
    .detail-content { padding: 12px 14px; }
  }
</style>
</head>

const tabDefs = [
  {key:"overview",label:"Overview"},
  {key:"catering",label:"Catering"},
  {key:"estates",label:"Estates & Porters"},
  {key:"av",label:"AV & Tech"},
  {key:"other",label:"Other Notes"}
];

let activeDay = "mon";
let openCards = {};
let activeTabs = {};

function init() {
  renderNav();
  renderMain();
}

function renderNav() {
  const nav = document.getElementById("dayNav");
  nav.innerHTML = days.map(d => {
    const evs = events[d.key] || [];
    return `<button class="day-tab${d.key===activeDay?" active":""}" onclick="selectDay('${d.key}')">
      <span class="dt-name">${d.label}</span>
      <span class="dt-num">${d.date.split(" ")[0]}</span>
      <span class="dt-count">${evs.length ? evs.length + " event" + (evs.length>1?"s":"") : "—"}</span>
    </button>`;
  }).join("");
}

function selectDay(key) {
  activeDay = key;
  renderNav();
  renderMain();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderMain() {
  const main = document.getElementById("main");
  const dayObj = days.find(d=>d.key===activeDay);
  const evs = events[activeDay] || [];

  if (!evs.length) {
    main.innerHTML = `<div class="day-heading"><h2>${dayObj.full}</h2></div><div class="empty-day"><p>No events scheduled.</p></div>`;
    return;
  }

  main.innerHTML = `
    <div class="day-heading">
      <h2>${dayObj.full}</h2>
      <span class="ev-count">${evs.length} event${evs.length>1?"s":""}</span>
    </div>
    <div class="events-stack">
      ${evs.map(ev => renderCard(ev)).join("")}
    </div>`;
}

function renderCard(ev) {
  const isOpen = !!openCards[ev.id];
  const activeTab = activeTabs[ev.id] || "overview";
  const hC = ev.catering.length > 0;
  const hE = ev.estates.length > 0;
  const hA = ev.av.length > 0;
  const hO = ev.other.length > 0;

  const badges = [
    hC ? `<span class="badge badge-c">Catering</span>` : "",
    hE ? `<span class="badge badge-e">Estates</span>` : "",
    hA ? `<span class="badge badge-a">AV</span>` : "",
    hO ? `<span class="badge badge-f">Notes</span>` : ""
  ].join("");

  const tabs = tabDefs.map(t => {
    const has = t.key==="overview"||(t.key==="catering"&&hC)||(t.key==="estates"&&hE)||(t.key==="av"&&hA)||(t.key==="other"&&hO);
    const cls = `dtab${activeTab===t.key?" active":""}${!has&&t.key!=="overview"?" empty":""}`;
    return `<button class="${cls}" onclick="switchTab(event,'${ev.id}','${t.key}')">${t.label}</button>`;
  }).join("");

  let content = "";
  if (activeTab === "overview") {
    content = `<div class="info-grid">${Object.entries(ev.overview).map(([k,v])=>`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join("")}</div>`;
  } else {
    const arr = ev[activeTab];
    const col = activeTab==="catering"?"c":activeTab==="estates"?"e":activeTab==="av"?"a":"f";
    if (!arr || arr.length === 0) {
      content = `<p class="empty-msg">No requirements noted for this category.</p>`;
    } else {
      content = `<div class="list-items">${arr.map(item=>`<div class="list-item"><div class="list-bullet ${col}"></div><div>${item}</div></div>`).join("")}</div>`;
    }
  }

  return `<div class="event-card" id="card-${ev.id}">
    <div class="card-header${isOpen?" open":""}" onclick="toggleCard('${ev.id}')">
      <span class="time-pill">${ev.time}</span>
      <span class="card-title">${ev.title}</span>
      <span class="card-mgr">${ev.mgr}</span>
      <div class="card-badges">${badges}</div>
      <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
    </div>
    <div class="card-detail${isOpen?" open":""}">
      <div class="detail-tabs">${tabs}</div>
      <div class="detail-content">${content}</div>
    </div>
  </div>`;
}

function toggleCard(id) {
  openCards[id] = !openCards[id];
  if (!activeTabs[id]) activeTabs[id] = "overview";
  renderMain();
}

function switchTab(e, id, tab) {
  e.stopPropagation();
  activeTabs[id] = tab;
  openCards[id] = true;
  renderMain();
}

init();
</script>
